<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
           font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
<title>Rei-AIOS 合わせ鏡</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060b;--sm:#7a7a90;--sb:#a8a8c0;--rei:#6e9ecf;--dfumt:#9b7ecf;--gold:#c4a85a;--bd:rgba(160,160,200,0.15);--mono:'JetBrains Mono',monospace;--jp:'Zen Kaku Gothic New',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--sb);font-family:var(--jp);-webkit-font-smoothing:antialiased;user-select:none;}
#titlebar{-webkit-app-region:drag;position:fixed;top:0;left:0;right:0;height:28px;background:linear-gradient(180deg,rgba(16,16,26,0.95),transparent);z-index:100;display:flex;align-items:center;padding:0 12px;}
#titlebar-title{font-family:var(--mono);font-size:10px;color:var(--sm);letter-spacing:.1em;}
#titlebar-close{-webkit-app-region:no-drag;width:12px;height:12px;border-radius:50%;background:rgba(207,110,126,0.5);border:none;cursor:pointer;margin-left:auto;transition:background 150ms;}
#titlebar-close:hover{background:rgba(207,110,126,0.9);}
#controls{position:fixed;bottom:0;left:0;right:0;height:36px;background:rgba(6,6,11,0.9);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:100;}
.cl{font-family:var(--mono);font-size:10px;color:var(--sm);}
.cb{font-family:var(--mono);font-size:10px;color:var(--sb);background:rgba(160,160,200,0.08);border:1px solid var(--bd);border-radius:3px;padding:3px 8px;cursor:pointer;transition:background 120ms,border-color 120ms;}
.cb:hover{background:rgba(160,160,200,0.15);border-color:rgba(160,160,200,0.3);}
.cb.active{background:rgba(110,158,207,0.2);border-color:rgba(110,158,207,0.5);color:var(--rei);}
.cs{width:1px;height:16px;background:var(--bd);}
#mirror-canvas{position:fixed;top:28px;left:0;width:100%;height:calc(100% - 64px);display:block;}
</style>
</head>
<body>
<div id="titlebar">
  <div id="titlebar-title">Rei-AIOS ／ 合わせ鏡</div>
  <button id="titlebar-close"></button>
</div>
<canvas id="mirror-canvas"></canvas>
<div id="controls">
  <span class="cl">MODE:</span>
  <button class="cb active" data-mode="horizontal">水平</button>
  <button class="cb" data-mode="vertical">垂直</button>
  <button class="cb" data-mode="radial">放射</button>
  <button class="cb" data-mode="dimensional">D-FUMT</button>
  <div class="cs"></div>
  <span class="cl">DEPTH:</span>
  <button class="cb" data-depth="1">1</button>
  <button class="cb active" data-depth="3">3</button>
  <button class="cb" data-depth="5">5</button>
</div>
<script>
(function(){
const PHI=1.6180339887,PIX=Math.PI*1.0159;
const canvas=document.getElementById('mirror-canvas');
const ctx=canvas.getContext('2d');
let cfg={mode:'horizontal',depth:3,reflectionOpacityBase:.75,reflectionOpacityDecay:.55,showActionFeed:true,showDepthLines:true,showDFUMTOverlay:true};
let cursors=[],actions=[],phase=0,oScroll=0;
function resize(){canvas.width=canvas.clientWidth;canvas.height=canvas.clientHeight;}
window.addEventListener('resize',resize);resize();
function loop(ts){phase=ts*.001;oScroll=(phase*20)%200;draw();requestAnimationFrame(loop);}
requestAnimationFrame(loop);
function draw(){
  const W=canvas.width,H=canvas.height,mW=cfg.showActionFeed?W*.68:W;
  ctx.clearRect(0,0,W,H);drawBg(W,H);
  ctx.save();ctx.beginPath();ctx.rect(0,0,mW,H);ctx.clip();drawMirror(mW,H);ctx.restore();
  if(cfg.showActionFeed)drawFeed(mW,W,H);
  if(cfg.showDFUMTOverlay)drawOverlay(mW,H);
  drawChrome(W,H,mW);
}
function drawBg(W,H){
  const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.8);
  bg.addColorStop(0,'#0c0c16');bg.addColorStop(1,'#06060b');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(110,158,207,0.04)';ctx.lineWidth=.5;
  for(let x=0;x<=W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}
function drawMirror(W,H){
  if(!cursors.length){drawIdle(W,H);return;}
  for(let d=cfg.depth;d>=1;d--){
    const op=cfg.reflectionOpacityBase*Math.pow(cfg.reflectionOpacityDecay,d-1);
    ctx.save();ctx.globalAlpha=op;drawAtDepth(d,W,H);ctx.restore();
  }
  if(cfg.showDepthLines)drawBorders(cfg.depth,W,H);
}
function mkTf(mode,W,H,sh,ox,oy,d){
  const fw=W*sh,fh=H*sh;
  if(mode==='horizontal')return(sx,sy)=>({tx:ox+fw-(sx-ox),ty:oy+(sy-oy)*sh+oy*(1-sh)});
  if(mode==='vertical')  return(sx,sy)=>({tx:ox+(sx-ox)*sh+ox*(1-sh),ty:oy+fh-(sy-oy)});
  if(mode==='radial')    return(sx,sy)=>({tx:ox+fw-sx*sh,ty:oy+fh-sy*sh});
  const a=d*(PIX/PHI),cos=Math.cos(a),sin=Math.sin(a),cx=W/2,cy=H/2,ps=Math.pow(1/PHI,d-1);
  return(sx,sy)=>{const dx=(sx-cx)*sh,dy=(sy-cy)*sh;return{tx:cx+(dx*cos-dy*sin)*ps,ty:cy+(dx*sin+dy*cos)*ps};};
}
function drawAtDepth(d,W,H){
  const sh=Math.pow(.7,d-1),fw=W*sh,fh=H*sh,ox=(W-fw)/2,oy=(H-fh)/2;
  const tf=mkTf(cfg.mode,W,H,sh,ox,oy,d);
  const sw=screen.width||W,s_h=screen.height||H;
  for(const c of cursors){
    if(!c.visible)continue;
    const{tx,ty}=tf((c.x/sw)*W,(c.y/s_h)*H);
    if(tx<0||tx>W||ty<0||ty>H)continue;
    if(c.trail&&c.trail.length>1){
      ctx.beginPath();ctx.strokeStyle=c.color+'60';ctx.lineWidth=Math.max(.5,2*sh);
      const f0=tf((c.trail[0].x/sw)*W,(c.trail[0].y/s_h)*H);
      ctx.moveTo(f0.tx,f0.ty);
      for(const pt of c.trail.slice(1)){const t=tf((pt.x/sw)*W,(pt.y/s_h)*H);ctx.lineTo(t.tx,t.ty);}
      ctx.stroke();
    }
    drawShape(tx,ty,Math.max(4,18*sh),c,d);
    if(d===1&&c.label){
      ctx.font=`${Math.max(8,11*sh)}px JetBrains Mono,monospace`;
      ctx.fillStyle=c.color;ctx.globalAlpha*=.85;
      ctx.fillText(c.label,tx+Math.max(4,18*sh)/2+4,ty-4);ctx.globalAlpha/=.85;
    }
  }
}
function drawShape(x,y,size,c,d){
  const s=size/2,cl=c.color,pulse=1+Math.sin(phase*3)*.12;
  const ds=s*(c.state==='thinking'?pulse:1);
  ctx.strokeStyle=cl;ctx.fillStyle=cl+'20';ctx.lineWidth=Math.max(.5,1.5-d*.2);
  if(c.type==='rei'){
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/6+phase*.5;ctx[i===0?'moveTo':'lineTo'](x+Math.cos(a)*ds,y+Math.sin(a)*ds);}
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,ds*.3,0,Math.PI*2);ctx.fillStyle=cl;ctx.fill();
  }else if(c.type==='dfumt'){
    ctx.beginPath();ctx.arc(x,y,ds,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(x,y,ds*.45,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x-ds,y);ctx.lineTo(x+ds,y);ctx.moveTo(x,y-ds);ctx.lineTo(x,y+ds);
    ctx.globalAlpha*=.5;ctx.stroke();ctx.globalAlpha/=.5;
  }else if(c.type==='agent'){
    ctx.beginPath();ctx.moveTo(x,y-ds);ctx.lineTo(x+ds,y);ctx.lineTo(x,y+ds);ctx.lineTo(x-ds,y);ctx.closePath();ctx.fill();ctx.stroke();
  }else{ctx.beginPath();ctx.moveTo(x-s,y-s);ctx.lineTo(x+s*.6,y);ctx.lineTo(x-s,y+s);ctx.closePath();ctx.fill();ctx.stroke();}
}
function drawBorders(depth,W,H){
  for(let d=1;d<=depth;d++){
    const sh=Math.pow(.7,d-1),fw=W*sh,fh=H*sh,fx=(W-fw)/2,fy=(H-fh)/2;
    const t=(d-1)/Math.max(depth-1,1),r=Math.round(110+(155-110)*t),g=Math.round(158+(126-158)*t);
    ctx.strokeStyle=`rgba(${r},${g},207,${.4-d*.06})`;ctx.lineWidth=Math.max(.3,1.5-d*.25);ctx.strokeRect(fx,fy,fw,fh);
    const cr=12*sh;ctx.strokeStyle=`rgba(${r},${g},207,${.7-d*.1})`;ctx.lineWidth=Math.max(.5,2-d*.3);
    for(const[cx,cy,dx,dy] of[[fx,fy,1,1],[fx+fw,fy,-1,1],[fx,fy+fh,1,-1],[fx+fw,fy+fh,-1,-1]]){
      ctx.beginPath();ctx.moveTo(cx+dx*cr,cy);ctx.lineTo(cx,cy);ctx.lineTo(cx,cy+dy*cr);ctx.stroke();
    }
  }
}
function drawIdle(W,H){
  const t=(Math.sin(phase*.8)+1)/2;
  ctx.font='13px JetBrains Mono,monospace';ctx.fillStyle=`rgba(122,122,144,${.3+t*.3})`;
  ctx.textAlign='center';ctx.fillText('— 合わせ鏡 待機中 —',W/2,H/2-20);
  ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle=`rgba(74,74,90,${.3+t*.2})`;
  ctx.fillText('MirrorUI.open() で接続',W/2,H/2+8);ctx.textAlign='left';
  ctx.strokeStyle=`rgba(110,158,207,${.12+t*.08})`;ctx.lineWidth=.8;ctx.beginPath();
  for(let i=0;i<180;i++){const a=(i/30)*Math.PI*2+phase*.3,r=Math.pow(PHI,i/60)*6;i===0?ctx.moveTo(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r):ctx.lineTo(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r);}
  ctx.stroke();
}
function drawFeed(x0,W,H){
  ctx.strokeStyle='rgba(160,160,200,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x0,0);ctx.lineTo(x0,H);ctx.stroke();
  ctx.font='11px JetBrains Mono,monospace';ctx.fillStyle='rgba(122,122,144,0.7)';ctx.fillText('ACTION FEED',x0+12,22);
  ctx.strokeStyle='rgba(160,160,200,0.08)';ctx.beginPath();ctx.moveTo(x0+8,30);ctx.lineTo(W-8,30);ctx.stroke();
  const lh=40,sy=50;
  actions.slice(0,Math.floor((H-sy)/lh)).forEach((ev,i)=>{
    const y=sy+i*lh,age=(Date.now()-ev.timestamp)/1000,fade=Math.max(.2,1-age/8);
    const c=(ev.agentId||'').includes('rei')?'#6e9ecf':(ev.agentId||'').includes('dfumt')?'#9b7ecf':'#c4a85a';
    ctx.beginPath();ctx.arc(x0+20,y+4,4,0,Math.PI*2);ctx.fillStyle=c+Math.round(fade*255).toString(16).padStart(2,'0');ctx.fill();
    ctx.font='10px JetBrains Mono,monospace';ctx.fillStyle=c+Math.round(fade*200).toString(16).padStart(2,'0');ctx.fillText((ev.agentId||'').slice(0,12),x0+30,y);
    ctx.font='11px Zen Kaku Gothic New,sans-serif';ctx.fillStyle=`rgba(160,160,192,${fade*.9})`;ctx.fillText((ev.label||'').slice(0,22),x0+30,y+14);
    ctx.font='9px JetBrains Mono,monospace';ctx.fillStyle=`rgba(74,74,90,${fade*.8})`;ctx.fillText(`${age.toFixed(1)}s ago`,x0+30,y+26);
  });
  if(!actions.length){ctx.font='10px JetBrains Mono,monospace';ctx.fillStyle='rgba(74,74,90,0.5)';ctx.fillText('イベント待機中...',x0+12,60);}
}
const F=['∀x: f(x)⊕f*(x)=0','φ=1.618…','π̂=π×1.0159…','Σφ⁻ⁿ=φ','D-FUMT写像∘写像⁻¹≡ε','limₙ Tⁿ(x)','⊕⊖種層展開','Rei::∞'];
function drawOverlay(W,H){
  const step=200,cols=Math.ceil(W/step)+1,off=oScroll%step;
  ctx.font='9px JetBrains Mono,monospace';ctx.fillStyle='rgba(155,126,207,0.06)';
  for(let c=0;c<cols;c++)ctx.fillText(F[c%F.length],c*step-off+8,H-12);
}
function drawChrome(W,H,mW){
  ctx.font='10px JetBrains Mono,monospace';ctx.fillStyle='rgba(122,122,144,0.6)';
  ctx.fillText(`合わせ鏡  mode:${cfg.mode}  depth:${cfg.depth}`,12,44);
  const active=cursors.filter(c=>c.visible).length;
  ctx.fillStyle=active>0?'rgba(110,158,207,0.5)':'rgba(74,74,90,0.4)';
  ctx.fillText(`agents:${active}`,12,H-10+28);
  ctx.fillStyle='rgba(155,126,207,0.35)';ctx.textAlign='right';ctx.fillText('D-FUMT',mW-12,H-10+28);ctx.textAlign='left';
}
if(window.mirrorBridge){
  window.mirrorBridge.onCursorBatch(b=>{cursors=b;});
  window.mirrorBridge.onActionEvent(e=>{actions.unshift(e);if(actions.length>30)actions.pop();});
  window.mirrorBridge.onConfigUpdate(c=>{Object.assign(cfg,c);});
  window.mirrorBridge.onWindowClose(()=>window.close());
  window.mirrorBridge.ready();
}
function setActive(group,val){
  document.querySelectorAll(`[data-${group}]`).forEach(b=>b.classList.toggle('active',b.dataset[group]===String(val)));
}
document.querySelectorAll('[data-mode]').forEach(b=>b.addEventListener('click',()=>{cfg.mode=b.dataset.mode;setActive('mode',cfg.mode);}));
document.querySelectorAll('[data-depth]').forEach(b=>b.addEventListener('click',()=>{cfg.depth=parseInt(b.dataset.depth);setActive('depth',cfg.depth);}));
document.getElementById('titlebar-close').addEventListener('click',()=>window.close());
})();
</script>
</body>
</html>
